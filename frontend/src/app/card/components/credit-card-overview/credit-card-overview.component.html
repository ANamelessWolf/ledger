<div class="card-overview" *ngIf="summary">

  <div class="section-header">
    <span class="section-title">Overview</span>
    <span *ngIf="isPending" class="days-badge">{{ daysToPay }} days to pay</span>
  </div>

  <div class="overview-body">

    <!-- Col 1: balance + details -->
    <div class="info-col" #infoCol>
      <div class="balance-card">
        <span class="balance-label">Available Balance</span>
        <span class="balance-amount">{{ summary.available }}</span>
      </div>

      <div class="details-grid">
        <div class="detail-cell">
          <span class="cell-label">Credit Limit</span>
          <span class="cell-value">{{ summary.credit }}</span>
        </div>
        <div class="detail-cell">
          <span class="cell-label">Used Credit</span>
          <span class="cell-value danger">{{ summary.usedCredit }}</span>
        </div>

        <ng-container *ngIf="summary.installment">
          <div class="detail-cell">
            <span class="cell-label">Installments</span>
            <span class="cell-value">{{ summary.installment.balance }}</span>
          </div>
          <div class="detail-cell">
            <span class="cell-label">Monthly Payment</span>
            <span class="cell-value">{{ summary.installment.monthlyPayment }}</span>
          </div>
        </ng-container>

        <div class="detail-cell">
          <span class="cell-label">Cut Date</span>
          <span class="cell-value">{{ cutDate }}</span>
        </div>
        <div class="detail-cell">
          <span class="cell-label">Due Date</span>
          <span class="cell-value">{{ dueDate }}</span>
        </div>
      </div>
    </div>


    <div class="chart-col">
      <app-credit-card-chart [summary]="summary" [size]="chartSize" />
    </div>

    <div class="card-col">
      <div class="mini-card-wrapper"
           [style.width.px]="cardW"
           [style.height.px]="cardH">
        <app-card-miniature
          [color]="summary.color"
          [banking]="summary.banking"
          [expiration]="summary.expiration"
          [ending]="summary.ending"
          [cardType]="summary.type"
          [style.transform]="'scale(' + cardScale + ')'"
        />
      </div>
    </div>

  </div>
</div>
