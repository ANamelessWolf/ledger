<div class="chart-section">
  <div class="section-header">
    <span class="section-title">Spending History</span>
    <span class="section-subtitle">Last 12 months</span>
  </div>
  <div class="chart-body">
    <div class="chart-area" id="ccSpendingChartContainer">
      <canvas id="creditCardSpendingChart"></canvas>
    </div>
    <div class="stats-panel">
      <div class="stat-card">
        <span class="stat-label">Monthly Average</span>
        <span class="stat-value">{{ cardSpending.average | maskCurrency:masked }}</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Max Spending</span>
        <span class="stat-value danger">{{ cardSpending.max | maskCurrency:masked }}</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Min Spending</span>
        <span class="stat-value success">{{ cardSpending.min | maskCurrency:masked }}</span>
      </div>
      <div class="stat-card accent">
        <span class="stat-label">Annual Total</span>
        <span class="stat-value">{{ masked ? '$** **.**' : (total | currencyFormat) }}</span>
      </div>
    </div>
  </div>
</div>
