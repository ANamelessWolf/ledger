<div class="payment-form" *ngIf="paymentForm" [formGroup]="paymentForm">

  <div class="form-section">
    <span class="section-label">Amount</span>
    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Total to Pay</mat-label>
        <input matInput appCurrencyInput formControlName="totalToPay" inputmode="decimal" aria-label="Total to Pay" required />
        <mat-error *ngIf="totalToPay?.errors?.['required']">Required.</mat-error>
      </mat-form-field>
    </div>
  </div>

  <div class="form-section">
    <span class="section-label">Date</span>
    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Pay Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="payDate" aria-label="Pay Date" required />
        <mat-datepicker-toggle matSuffix [for]="picker" />
        <mat-datepicker #picker />
        <mat-error *ngIf="payDate?.errors?.['required']">Required.</mat-error>
      </mat-form-field>
    </div>
  </div>

</div>
