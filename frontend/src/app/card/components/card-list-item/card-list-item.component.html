<div class="item" [class.selected]="isSelected" [class.not-selected]="!isSelected">

  <!-- Selected layout -->
  <div *ngIf="isSelected" class="selected-content">
    <div class="info-col">
      <div class="top-row">
        <span class="card-name">{{ data.name }}</span>
        <div *ngIf="data.isCreditCard" class="payment-badge" [ngClass]="statusStyle">{{ data.status }}</div>
      </div>
      <span class="card-type">{{ cardType }}</span>
      <div class="status-row">
        <span class="status-dot" [ngClass]="statusDotClass"></span>
        <span class="status-label">{{ cardStatus }}</span>
      </div>
    </div>
    <div class="mini-card-wrapper">
      <app-card-miniature
        [miniMode]="true"
        [color]="data.color || 'blue'"
        [banking]="data.entity"
        [ending]="data.ending">
      </app-card-miniature>
    </div>
  </div>

  <!-- Not selected layout -->
  <ng-container *ngIf="!isSelected">
    <span class="status-dot" [ngClass]="statusDotClass"></span>
    <div class="main-info">
      <span class="card-name">{{ data.name }}</span>
      <span class="sub-info">{{ cardType }} · {{ cardEnding }}</span>
    </div>
    <div *ngIf="data.isCreditCard" class="payment-badge" [ngClass]="statusStyle">{{ data.status }}</div>
  </ng-container>

</div>
