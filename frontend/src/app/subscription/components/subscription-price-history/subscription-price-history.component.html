<h2 mat-dialog-title>Price History — {{ data.subscriptionName }}</h2>

<mat-dialog-content class="price-history-content">
  <div *ngIf="loading" class="loading-container">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <div *ngIf="!loading && chartData.labels.length === 0" class="empty-state">
    <p>No payment history found for this subscription.</p>
  </div>

  <app-line-chart
    *ngIf="!loading && chartData.labels.length > 0"
    [data]="chartData"
    [chartHeight]="340">
  </app-line-chart>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button type="button" mat-button (click)="close()">Close</button>
</mat-dialog-actions>
