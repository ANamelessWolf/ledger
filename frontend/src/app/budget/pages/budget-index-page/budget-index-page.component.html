<app-page-layout
  [title]="'Budget'"
  [hasFilter]="false"
  [hasWidget]="true"
  (onSearch)="onSearch($event)"
  (add)="addBudget()">

  <div buttons>
    <button type="button" mat-icon-button matTooltip="Manage budgets" (click)="openManageDialog()">
      <mat-icon>settings</mat-icon>
    </button>
  </div>

  <div widget>
    <app-budget-summary-widget
      [summaries]="summaries">
    </app-budget-summary-widget>

    <app-budget-summary-card
      [summaries]="summaries"
      [yearRange]="yearRange"
      [allBudgetItems]="allBudgetItems"
      [expenseTypes]="expenseTypes"
      [vendors]="vendors"
      (summaryRequested)="onSummaryRequested($event)"
      (detailsRequested)="onDetailsRequested($event)"
      (manageItemsRequested)="onManageItemsRequested($event)">
    </app-budget-summary-card>
  </div>

</app-page-layout>
