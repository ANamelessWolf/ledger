<h2 mat-dialog-title>Filtrar mensualidades</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="filter-form">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Estado</mat-label>
      <mat-select formControlName="status">
        <mat-option *ngFor="let s of statusOptions" [value]="s.value">{{ s.label }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-divider></mat-divider>

    <p class="section-label">Rango de fechas</p>

    <div class="date-row">
      <mat-form-field appearance="outline" class="flex-field">
        <mat-label>Mes inicio</mat-label>
        <mat-select formControlName="fromMonth">
          <mat-option *ngFor="let m of months" [value]="m.value">{{ m.label }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="year-field">
        <mat-label>Año inicio</mat-label>
        <mat-select formControlName="fromYear">
          <mat-option *ngFor="let y of years" [value]="y">{{ y }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="date-row">
      <mat-form-field appearance="outline" class="flex-field">
        <mat-label>Mes fin</mat-label>
        <mat-select formControlName="toMonth">
          <mat-option *ngFor="let m of months" [value]="m.value">{{ m.label }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="year-field">
        <mat-label>Año fin</mat-label>
        <mat-select formControlName="toYear">
          <mat-option *ngFor="let y of years" [value]="y">{{ y }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <mat-divider></mat-divider>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Wallet group</mat-label>
      <mat-select formControlName="walletGroupId">
        <mat-option [value]="null">Todos</mat-option>
        <mat-option *ngFor="let w of data.walletGroups" [value]="w.id">{{ w.name }}</mat-option>
      </mat-select>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button type="button" mat-button (click)="cancel()">Cancelar</button>
  <button type="button" mat-stroked-button color="warn" (click)="clear()">
    <mat-icon>filter_list_off</mat-icon>
    Limpiar
  </button>
  <button type="button" mat-raised-button color="primary" (click)="apply()">Aplicar</button>
</mat-dialog-actions>
