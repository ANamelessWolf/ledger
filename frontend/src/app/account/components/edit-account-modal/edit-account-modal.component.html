<div class="modal-body" [formGroup]="form">

  <div class="form-grid">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Account Name</mat-label>
      <input matInput formControlName="name" />
      <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="2"></textarea>
    </mat-form-field>
  </div>

  <div class="balance-section">
    <p class="balance-label">Main Balance</p>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Balance ({{ currencySymbol }})</mat-label>
      <input matInput type="number" formControlName="mainBalance" />
      <mat-error *ngIf="form.get('mainBalance')?.hasError('required')">Balance is required</mat-error>
      <mat-error *ngIf="form.get('mainBalance')?.hasError('min')">Must be 0 or greater</mat-error>
    </mat-form-field>

    <div class="total-info">
      <mat-icon>info_outline</mat-icon>
      <span>Total balance (all sections): <strong>{{ defaultCurrencySymbol }} {{ totalBalance | number:'1.2-2' }}</strong> — calculated, not editable</span>
    </div>
  </div>

</div>
